name: Atualizar dados diariamente

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Atualizar dados.json
        run: |
          DATA=$(date +"%Y-%m-%d")
          cat > dados.json <<EOF
          {
            "titulo": "Meu site",
            "texto": "Conteúdo atualizado automaticamente pelo GitHub Actions.",
            "atualizado_em": "$DATA"
          }
          EOF

      - name: Salvar alteração no GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add dados.json
          git commit -m "Atualiza dados automaticamente" || echo "Nada para atualizar"
          git push
